# Render Blueprint — backend services only (frontend on Vercel)
# https://render.com/docs/blueprint-spec

services:
  # FastAPI Backend
  - type: web
    name: docmind-backend
    runtime: docker
    region: oregon
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: docmind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: docmind-redis
          type: redis
          property: connectionString
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_FAST_MODEL
        value: llama-3.1-8b-instant
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"

  # Redis
  - type: redis
    name: docmind-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

# PostgreSQL Database
databases:
  - name: docmind-db
    region: oregon
    plan: free
    databaseName: docmind
    user: docmind
